<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/gif" href="/favicon.gif" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gaspard Catry - Portfolio développeur full-stack" />
    <title>Gaspard Catry - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply theme before React hydrates to prevent flash
      (function() {
        var stored = localStorage.getItem('portfolio-theme');
        var valid = ['original','original-dark','vscode','spotify'];
        if (stored && valid.indexOf(stored) !== -1) {
          document.documentElement.setAttribute('data-theme', stored);
        } else {
          document.documentElement.setAttribute('data-theme',
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'original-dark' : 'original'
          );
        }
      })();
      // SPA redirect restore for GitHub Pages
      (function() {
        var p = window.location.search.slice(1).split('&').reduce(function(acc, kv) {
          var parts = kv.split('=');
          if (parts[0] === 'p') acc = decodeURIComponent(parts[1]);
          return acc;
        }, null);
        if (p) window.history.replaceState(null, null, p);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
