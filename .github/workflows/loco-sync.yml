name: Sync Translations from Loco

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & Commit Translations
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch locale list from Loco
        id: locales
        run: |
          JSON=$(curl -sf \
            -H "Authorization: Loco ${{ secrets.LOCO_API_KEY }}" \
            "https://localise.biz/api/locales")
          echo "json<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Locales: $(echo "$JSON" | jq -r '[.[].code] | join(", ")')"

      - name: Download locale files
        run: |
          mkdir -p public/locales
          echo '${{ steps.locales.outputs.json }}' | jq -r '.[].code' | while read FULL_CODE; do
            SHORT=$(echo "$FULL_CODE" | cut -d'-' -f1)
            echo "Fetching $FULL_CODE → public/locales/${SHORT}.json"
            curl -sf \
              -H "Authorization: Loco ${{ secrets.LOCO_API_KEY }}" \
              "https://localise.biz/api/export/locale/${FULL_CODE}.json?format=i18next" \
              -o "public/locales/${SHORT}.json"
          done

      - name: Regenerate src/lib/locales.ts
        run: |
          node -e "
          const fs = require('fs');
          const locales = JSON.parse(process.env.LOCALES_JSON);
          const LABEL_MAP = {
            fr: 'Français', en: 'English', de: 'Deutsch', es: 'Español',
            it: 'Italiano', pt: 'Português', nl: 'Nederlands', pl: 'Polski',
            ru: 'Русский', zh: '中文', ja: '日本語', ko: '한국어',
          };
          const seen = new Set();
          const supported = locales
            .map(l => ({ code: l.code.split('-')[0], label: LABEL_MAP[l.code.split('-')[0]] || l.name }))
            .filter(l => { if (seen.has(l.code)) return false; seen.add(l.code); return true; });
          const lines = [
            '// Auto-generated by loco-sync workflow — do not edit manually',
            'export const SUPPORTED_LOCALES = ' + JSON.stringify(supported, null, 2) + ' as const',
            '',
            \"export type LocaleCode = typeof SUPPORTED_LOCALES[number]['code']\",
            'export const SUPPORTED_LANGS = SUPPORTED_LOCALES.map((l) => l.code)',
            '',
          ];
          fs.writeFileSync('src/lib/locales.ts', lines.join('\n'));
          console.log('Updated locales:', supported.map(l => l.code).join(', '));
          "
        env:
          LOCALES_JSON: ${{ steps.locales.outputs.json }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/locales/ src/lib/locales.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat public/locales/ src/lib/locales.ts
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/locales/ src/lib/locales.ts
          git commit -m "chore(i18n): sync translations from Loco [skip ci]"
          git push
