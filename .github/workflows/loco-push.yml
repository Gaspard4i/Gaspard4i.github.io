name: Push Translations to Loco

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'public/locales/fr.json'
      - 'public/locales/en.json'

jobs:
  push:
    name: Upload locale files to Loco
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push French (source locale)
        run: |
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Loco ${{ secrets.LOCO_API_KEY }}" \
            --data-binary @public/locales/fr.json \
            "https://localise.biz/api/import/json?locale=fr-FR&index=id&tag-new=auto-imported")
          echo "FR import: $RESPONSE"

      - name: Push English
        run: |
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Loco ${{ secrets.LOCO_API_KEY }}" \
            --data-binary @public/locales/en.json \
            "https://localise.biz/api/import/json?locale=en-GB&index=id&ignore-new=true")
          echo "EN import: $RESPONSE"
