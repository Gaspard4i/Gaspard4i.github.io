name: Push Translations to Loco

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'public/locales/*.json'

jobs:
  push:
    name: Upload locale files to Loco
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push all locale files to Loco
        run: |
          LOCALE_MAP="fr:fr-FR en:en-GB es:es-ES it:it-IT de:de-DE nl:nl-NL pt:pt-PT"
          for PAIR in $LOCALE_MAP; do
            SHORT="${PAIR%%:*}"
            FULL="${PAIR##*:}"
            FILE="public/locales/${SHORT}.json"
            if [ ! -f "$FILE" ]; then
              echo "Skipping $SHORT (no file)"
              continue
            fi
            # Source locale (fr) can create new assets, others cannot
            if [ "$SHORT" = "fr" ]; then
              EXTRA="&tag-new=auto-imported"
            else
              EXTRA="&ignore-new=true"
            fi
            echo "Pushing $FILE → Loco locale $FULL"
            curl -sf -X POST \
              -H "Authorization: Loco ${{ secrets.LOCO_API_KEY }}" \
              --data-binary @"$FILE" \
              "https://localise.biz/api/import/json?locale=${FULL}&index=id${EXTRA}"
          done
