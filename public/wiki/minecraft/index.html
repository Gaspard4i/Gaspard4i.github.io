<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaspard's Minecraft Mods Wiki</title>
  <meta name="description" content="Documentation and wiki for Minecraft mods by Gaspard4i">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
  <style>
    .prose h2 { scroll-margin-top: 5rem; }
    .sidebar-link.active { background: oklch(var(--p) / 0.15); color: oklch(var(--p)); font-weight: 600; }
  </style>
</head>
<body class="min-h-screen bg-base-200">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
    <div class="navbar-start">
      <label for="sidebar-toggle" class="btn btn-ghost btn-square lg:hidden">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </label>
      <a href="/wiki/minecraft/" class="btn btn-ghost text-xl gap-2">
        <span>⛏️</span> Mods Wiki
      </a>
    </div>
    <div class="navbar-center hidden lg:flex">
      <ul class="menu menu-horizontal px-1" id="nav-mods"></ul>
    </div>
    <div class="navbar-end">
      <a href="https://github.com/Gaspard4i" class="btn btn-ghost btn-square" target="_blank" rel="noopener">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <select class="select select-ghost select-sm w-28" id="theme-select">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="synthwave">Synthwave</option>
        <option value="dracula">Dracula</option>
        <option value="forest">Forest</option>
      </select>
    </div>
  </div>

  <!-- Layout -->
  <input type="checkbox" id="sidebar-toggle" class="hidden">
  <div class="flex max-w-7xl mx-auto">

    <!-- Sidebar -->
    <aside class="w-64 shrink-0 hidden lg:block">
      <div class="sticky top-16 p-4 h-[calc(100vh-4rem)] overflow-y-auto">
        <ul class="menu menu-sm bg-base-100 rounded-box w-full" id="sidebar-nav"></ul>
      </div>
    </aside>

    <!-- Mobile sidebar overlay -->
    <label for="sidebar-toggle" class="fixed inset-0 bg-black/50 z-30 hidden" id="sidebar-overlay"></label>
    <aside class="fixed left-0 top-16 w-72 h-[calc(100vh-4rem)] bg-base-100 z-40 transform -translate-x-full transition-transform" id="mobile-sidebar">
      <div class="p-4 overflow-y-auto h-full">
        <ul class="menu menu-sm w-full" id="sidebar-nav-mobile"></ul>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 min-w-0 p-4 lg:p-8">
      <div id="content"></div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer footer-center p-6 bg-base-100 text-base-content mt-8">
    <p>Made by <a href="https://github.com/Gaspard4i" class="link link-primary" target="_blank">Gaspard4i</a> — MIT License</p>
  </footer>

  <script src="wiki.js"></script>
</body>
</html>
